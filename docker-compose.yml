services:
  postgres:
    image: postgres:16-alpine
    container_name: distributor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: distributor_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d distributor_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: distributor-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_NAME: Distributor API
      DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/distributor_db
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      JWT_SECRET_KEY: dev-secret-key-with-at-least-32-characters
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "120"
      DB_INIT_ON_STARTUP: "false"
      DB_STARTUP_STRICT: "false"
    command: >
      sh -c "alembic -c alembic.ini upgrade head && python -m app.infrastructure.db.seed_demo && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: distributor-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "5173:5173"

volumes:
  postgres_data:
